[advisories]
# Upstream transitive dependency issues. Each entry must currently be
# detected — `cargo deny` warns on `[advisory-not-detected]` for stale
# entries. When a dep is updated and an advisory no longer applies,
# remove the entry rather than leaving it as silent debt.
ignore = [
    # Transitive via eidetica → iroh
    "RUSTSEC-2023-0089", # atomic-polyfill unmaintained
    "RUSTSEC-2025-0012", # backoff unmaintained (use backon)
    "RUSTSEC-2026-0098", # rustls-webpki URI name constraints
    "RUSTSEC-2026-0099", # rustls-webpki wildcard name constraints
    "RUSTSEC-2026-0104", # rustls-webpki CRL parsing panic
    "RUSTSEC-2026-0105", # core2 unmaintained + all versions yanked (via cid → eidetica)
    "RUSTSEC-2026-0118", # hickory-proto NSEC3 closest-encloser unbounded loop
    "RUSTSEC-2026-0119", # hickory-proto O(n²) name-compression CPU exhaustion
    # Transitive via headjack → matrix-sdk
    "RUSTSEC-2024-0384", # instant unmaintained
    "RUSTSEC-2024-0436", # paste-impl unmaintained
]

[bans]
multiple-versions = "allow"

[licenses]
allow = [
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception", # cranelift family (via wasmtime)
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0", # xxhash-rust (transitive)
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.95
