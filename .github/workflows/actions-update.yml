name: "Deps: Actions Update"

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      hold_days:
        description: "Days to hold before allowing merge"
        required: false
        default: "7"
        type: string

concurrency:
  group: deps-actions-update
  cancel-in-progress: true

jobs:
  actions-update:
    name: Actions Update
    runs-on: ubuntu-latest
    environment: automation
    if: github.repository_owner == 'arcuru'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Setup deps branch
        uses: ./.github/actions/setup-deps-branch
        with:
          branch: deps/actions-update

      - name: Update action versions
        id: update
        run: |
          CHANGES=""

          update_action() {
            local FILE="$1"
            local OWNER="$2"
            local REPO="$3"
            local CURRENT_SHA="$4"
            local CURRENT_TAG="$5"

            # dtolnay/rust-toolchain uses branches, not releases; track master branch directly
            if [ "$OWNER/$REPO" = "dtolnay/rust-toolchain" ]; then
              NEW_SHA=$(gh api "repos/$OWNER/$REPO/branches/master" --jq '.commit.sha' 2>/dev/null || true)
              if [ -z "$NEW_SHA" ] || [ "$NEW_SHA" = "$CURRENT_SHA" ]; then
                return
              fi
              sed -i "s|${OWNER}/${REPO}@${CURRENT_SHA} # ${CURRENT_TAG}|${OWNER}/${REPO}@${NEW_SHA} # ${CURRENT_TAG}|g" "$FILE"
              if ! git diff --quiet "$FILE"; then
                CHANGES="${CHANGES}- \`${OWNER}/${REPO}\`: updated master SHA (in \`$(basename "$FILE")\`)\n"
              fi
              return
            fi

            # Get latest release
            LATEST=$(gh api "repos/$OWNER/$REPO/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            if [ -z "$LATEST" ]; then
              LATEST=$(gh api "repos/$OWNER/$REPO/tags" --jq '.[0].name' 2>/dev/null || true)
            fi
            if [ -z "$LATEST" ]; then
              return
            fi

            if [ "$LATEST" = "$CURRENT_TAG" ]; then
              return
            fi

            # Get the SHA and type for the latest tag ref
            REF_INFO=$(gh api "repos/$OWNER/$REPO/git/ref/tags/$LATEST" --jq '.object | "\(.sha) \(.type)"' 2>/dev/null || true)
            if [ -z "$REF_INFO" ]; then
              return
            fi
            NEW_SHA=$(echo "$REF_INFO" | cut -d' ' -f1)
            REF_TYPE=$(echo "$REF_INFO" | cut -d' ' -f2)

            # For annotated tags, resolve to the underlying commit
            if [ "$REF_TYPE" = "tag" ]; then
              NEW_SHA=$(gh api "repos/$OWNER/$REPO/git/tags/$NEW_SHA" --jq '.object.sha' 2>/dev/null || true)
              if [ -z "$NEW_SHA" ]; then
                return
              fi
            fi

            if [ "$NEW_SHA" = "$CURRENT_SHA" ]; then
              return
            fi

            sed -i "s|${OWNER}/${REPO}@${CURRENT_SHA} # ${CURRENT_TAG}|${OWNER}/${REPO}@${NEW_SHA} # ${LATEST}|g" "$FILE"

            if ! git diff --quiet "$FILE"; then
              CHANGES="${CHANGES}- \`${OWNER}/${REPO}\`: ${CURRENT_TAG} → ${LATEST} (in \`$(basename "$FILE")\`)\n"
            fi
          }

          for FILE in .github/workflows/*.yml .github/actions/*/action.yml .github/actions/*/action.yaml; do
            [ -f "$FILE" ] || continue

            FILE_CONTENT=$(cat "$FILE")

            while IFS= read -r LINE; do
              if [[ "$LINE" =~ uses:[[:space:]]+([^/]+)/([^@]+)@([a-f0-9]+)[[:space:]]+#[[:space:]]*(.*) ]]; then
                OWNER="${BASH_REMATCH[1]}"
                REPO="${BASH_REMATCH[2]}"
                CURRENT_SHA="${BASH_REMATCH[3]}"
                CURRENT_TAG=$(echo "${BASH_REMATCH[4]}" | xargs)

                update_action "$FILE" "$OWNER" "$REPO" "$CURRENT_SHA" "$CURRENT_TAG"
              fi
            done <<< "$FILE_CONTENT"
          done

          if [ -z "$CHANGES" ]; then
            CHANGES="No action updates available."
          fi

          {
            echo "changes<<CHANGES_EOF"
            echo -e "$CHANGES"
            echo "CHANGES_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and create PR
        uses: ./.github/actions/commit-and-pr
        with:
          branch: deps/actions-update
          files: ".github/workflows/"
          commit-message: "chore(deps): update GitHub Actions versions"
          pr-title: "chore(deps): update GitHub Actions versions"
          pr-body: |
            ## GitHub Actions Update

            Monthly update of GitHub Actions to latest versions.

            ### Updated Actions

            ${{ steps.update.outputs.changes }}
          hold-days: ${{ inputs.hold_days || '7' }}
          update-comment: "Updated with latest action versions."
          github-token: ${{ secrets.PAT_TOKEN }}
